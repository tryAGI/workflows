name: Opens a new PR if there are OpenAPI updates
on:
  workflow_call:
    inputs:
      library-path:
        description: 'Path to the SDK library directory (e.g., src/libs/Anthropic)'
        required: true
        type: string

concurrency:
  group: auto-update
  cancel-in-progress: true

jobs:
  check-openapi-updates:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Git user
        run: |
          git config --local user.email "dependabot@bot.com"
          git config --local user.name "github-actions[bot]"

      - name: Check for existing open PR
        id: existing_pr
        run: |
          EXISTING_PR=$(gh pr list --head "bot/update-openapi" --state open --json number,url --jq '.[0]')
          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            echo "url=$(echo "$EXISTING_PR" | jq -r '.url')" >> "$GITHUB_OUTPUT"
            echo "Found existing open PR: $(echo "$EXISTING_PR" | jq -r '.url')"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing open PR found"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: Create branch from main
        run: |
          git fetch origin bot/update-openapi || true
          git checkout -b "bot/update-openapi" origin/main

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Generate code
        run: |
          cd ${{ inputs.library-path }}
          chmod +x ./generate.sh
          ./generate.sh

      - name: Check for changes
        id: changes
        run: |
          CHANGED=$(git diff --name-only)
          if [ -z "$CHANGED" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close stale PR and clean up branch (no changes)
        if: steps.changes.outputs.has_changes == 'false' && steps.existing_pr.outputs.exists == 'true'
        run: |
          echo "No changes detected but open PR #${{ steps.existing_pr.outputs.number }} exists — closing as stale"
          gh pr close "${{ steps.existing_pr.outputs.number }}" --comment "Closing: spec regeneration now matches main, no changes needed."
          git push origin --delete bot/update-openapi || true
          echo "### No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
          echo "Closed stale PR #${{ steps.existing_pr.outputs.number }} and deleted branch \`bot/update-openapi\`." >> "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: Clean up orphaned branch (no changes, no PR)
        if: steps.changes.outputs.has_changes == 'false' && steps.existing_pr.outputs.exists == 'false'
        run: |
          if git ls-remote --exit-code --heads origin bot/update-openapi > /dev/null 2>&1; then
            echo "No changes and no open PR — deleting orphaned branch"
            git push origin --delete bot/update-openapi || true
            echo "### No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
            echo "Deleted orphaned branch \`bot/update-openapi\` (no associated PR)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### No Changes Detected" >> "$GITHUB_STEP_SUMMARY"
            echo "OpenAPI spec is up to date. Nothing to do." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add .
          git commit -m "feat: Updated OpenAPI spec"
          git push --force-with-lease -u origin bot/update-openapi

      - name: Wait for 15 seconds
        if: steps.changes.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists == 'false'
        run: |
          sleep 15

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists == 'false'
        run: |
          PR_URL=$(gh pr create -B main -H bot/update-openapi --title 'feat: Updated OpenAPI spec' --body 'Automated OpenAPI spec update')
          echo "### PR Created" >> "$GITHUB_STEP_SUMMARY"
          echo "Created new PR: $PR_URL" >> "$GITHUB_STEP_SUMMARY"
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN }}

      - name: Summary for updated PR
        if: steps.changes.outputs.has_changes == 'true' && steps.existing_pr.outputs.exists == 'true'
        run: |
          echo "### PR Updated" >> "$GITHUB_STEP_SUMMARY"
          echo "Force-pushed new changes to existing PR: ${{ steps.existing_pr.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

