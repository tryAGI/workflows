name: Reusable MkDocs Pages Deploy

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: "10.0.x"
      python-version:
        required: false
        type: string
        default: "3.12"
      run-docs-sync:
        required: false
        type: boolean
        default: true
      docs-sync-command:
        required: false
        type: string
        default: "autosdk docs sync ."
      theme-source:
        required: false
        type: string
        default: "git+https://github.com/tryAGI/docs.git@main#subdirectory=theme"
      site-dir:
        required: false
        type: string
        default: "_site"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Detect AutoSDK docs sync support
        id: docs-sync
        shell: bash
        run: |
          enabled=false

          if [[ "${{ inputs.run-docs-sync }}" == "true" ]]; then
            if [[ -f autosdk.docs.json ]]; then
              enabled=true
            else
              for candidate in README.md docs/index.md; do
                if [[ -f "$candidate" ]] && grep -Eq '# EXAMPLES:START|# EXAMPLES:END|# EXAMPLES #' "$candidate"; then
                  enabled=true
                  break
                fi
              done
            fi
          fi

          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        if: steps.docs-sync.outputs.enabled == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install AutoSDK CLI
        if: steps.docs-sync.outputs.enabled == 'true'
        run: dotnet tool install --global autosdk.cli --prerelease

      - name: Generate docs
        if: steps.docs-sync.outputs.enabled == 'true'
        run: ${{ inputs.docs-sync-command }}

      - name: Install MkDocs dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install mkdocs-material 'pygments<2.20' mkdocs-copy-to-llm "${{ inputs.theme-source }}"

      - name: Build with MkDocs
        run: |
          source .venv/bin/activate
          NO_MKDOCS_2_WARNING=1 mkdocs build -d "${{ inputs.site-dir }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ inputs.site-dir }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
