name: Auto-approve and auto-merge bot pull requests
on:
  workflow_call:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.draft == false && (github.actor == 'dependabot[bot]' || github.actor == 'HavenDV') && github.repository_owner == 'tryAGI' }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Dependabot metadata
        if: ${{ github.actor == 'dependabot[bot]' }}
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Show sender
        run: |
          echo "${{ github.event.pull_request.sender }}"

      - name: Show triggering_actor
        run: |
          echo "${{ github.triggering_actor }}"

      - name: Approve a PR
        run: |
          gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: |
          for attempt in 1 2 3 4 5; do
            if gh pr merge --auto --squash "$PR_URL"; then
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Failed to enable auto-merge after $attempt attempts." >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "Attempt $attempt failed. Retrying in $sleep_seconds seconds..."
            sleep "$sleep_seconds"
          done
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
